services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost
    expose:
      - '3001'
    networks:
      - wedding-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wedding-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - wedding-net

networks:
  wedding-net:
    driver: bridge
